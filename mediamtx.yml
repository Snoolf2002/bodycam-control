###############################################################################
# MediaMTX Configuration – Bodycam Control Plane
###############################################################################

# ── RTSP Ingest ───────────────────────────────────────────────────────────────
# Port used for direct RTSP pushes (kept open for future use / fallback).
rtspAddress: :6604

# ── REST Management API ───────────────────────────────────────────────────────
api: yes
apiAddress: :9997

# ── Protocol Conversions ──────────────────────────────────────────────────────
# WebRTC – low-latency browser playback
webrtc: yes
webrtcAddress: :8889

# HLS – broad compatibility browser playback
hls: yes
hlsAddress: :8888

# ── Authentication ────────────────────────────────────────────────────────────
# Every read/publish request is validated against the FastAPI webhook.
externalAuthenticationURL: http://app:8001/webhook/rtsp_auth

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  # Dynamically capture the stream path/token using a regular expression.
  # When a client requests HLS (e.g., :8888/<token>/index.m3u8), MediaMTX matches
  # it to this rule and pulls the stream from our TCP-RTSP proxy (port 6609) on demand.
  "~^(.+)$":
    source: rtsp://app:6609/$G1
    sourceOnDemand: yes
