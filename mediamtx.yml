###############################################################################
# MediaMTX Configuration – Bodycam Control Plane
###############################################################################

# ── RTSP Ingestion ───────────────────────────────────────────────────────────
# The RTSP proxy (port 6609) bridges camera sockets to MediaMTX on demand.
# Cameras no longer push to MediaMTX directly; MediaMTX pulls via proxy.
rtspAddress: :6604

# ── Protocol Conversions ────────────────────────────────────────────────────
# WebRTC – low-latency browser playback
webrtc: yes
webrtcAddress: :8889

# HLS – broad compatibility browser playback
hls: yes
hlsAddress: :8888

# ── Authentication ──────────────────────────────────────────────────────────
# Every publish/read request is validated against the FastAPI backend
externalAuthenticationURL: http://app:8001/webhook/rtsp_auth

# ── Path routing ────────────────────────────────────────────────────────────
# For any stream path, MediaMTX will pull from our RTSP proxy on port 6609.
# The $MTX_PATH placeholder passes the original stream path through.
paths:
  all:
    source: rtsp://app:6609/$MTX_PATH
    sourceOnDemand: yes
