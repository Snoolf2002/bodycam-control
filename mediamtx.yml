###############################################################################
# MediaMTX Configuration – Bodycam Control Plane
###############################################################################

# ── RTSP Ingest ───────────────────────────────────────────────────────────────
# Port used for direct RTSP pushes (kept open for future use / fallback).
rtspAddress: :6604

# ── REST Management API ───────────────────────────────────────────────────────
api: yes
apiAddress: :9997

# ── Protocol Conversions ──────────────────────────────────────────────────────
# WebRTC – low-latency browser playback
webrtc: yes
webrtcAddress: :8889

# HLS – broad compatibility browser playback
hls: yes
hlsAddress: :8888

# ── Authentication ────────────────────────────────────────────────────────────
# Every read/publish request is validated against the FastAPI webhook.
authMethod: http
authHTTPAddress: http://app:8001/webhook/rtsp_auth

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  "~^(.+)$":
    source: publisher
